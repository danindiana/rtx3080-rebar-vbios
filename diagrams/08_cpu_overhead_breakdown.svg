<!-- note -->
<g id="node11" class="node">
<title>note</title>
<polygon fill="#111122" stroke="black" points="569,-128 251,-128 251,0 575,0 575,-122 569,-128"/>
<polyline fill="none" stroke="black" points="569,-128 569,-122 "/>
<polyline fill="none" stroke="black" points="575,-122 569,-122 "/>
<text text-anchor="middle" x="413" y="-115.2" font-family="Helvetica,sans-Serif" font-size="11.00" fill="#aaaacc">KEY POINT</text>
<text text-anchor="middle" x="413" y="-103.2" font-family="Helvetica,sans-Serif" font-size="11.00" fill="#aaaacc">─────────────────────────────────────────</text>
<text text-anchor="middle" x="413" y="-91.2" font-family="Helvetica,sans-Serif" font-size="11.00" fill="#aaaacc">The same bytes are transferred either way.</text>
<text text-anchor="middle" x="413" y="-79.2" font-family="Helvetica,sans-Serif" font-size="11.00" fill="#aaaacc">PCIe bandwidth is unchanged by ReBAR.</text>
<text text-anchor="middle" x="413" y="-67.2" font-family="Helvetica,sans-Serif" font-size="11.00" fill="#aaaacc">The overhead is in CPU/driver coordination,</text>
<text text-anchor="middle" x="413" y="-55.2" font-family="Helvetica,sans-Serif" font-size="11.00" fill="#aaaacc">not in the copy itself.</text>
<text text-anchor="middle" x="413" y="-43.2" font-family="Helvetica,sans-Serif" font-size="11.00" fill="#aaaacc">─────────────────────────────────────────</text>
<text text-anchor="middle" x="413" y="-31.2" font-family="Helvetica,sans-Serif" font-size="11.00" fill="#aaaacc">ReBAR reduces the number of epochs.</text>
<text text-anchor="middle" x="413" y="-19.2" font-family="Helvetica,sans-Serif" font-size="11.00" fill="#aaaacc">Fewer epochs = fewer sync events = less latency.</text>
<text text-anchor="middle" x="413" y="-7.2" font-family="Helvetica,sans-Serif" font-size="11.00" fill="#aaaacc">Transfer becomes bandwidth&#45;limited, not latency&#45;limited.</text>
</g>
